<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería - Tour Gastronómico Thermomix</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0a0a0a;
            color: #f5f5f5;
            min-height: 100vh;
        }
        nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 2rem;
            background: #111;
            border-bottom: 2px solid #6c5ce7;
        }
        nav a { color: #6c5ce7; text-decoration: none; font-size: 0.9rem; }
        nav .title { color: #fff; font-weight: 600; }

        .container { max-width: 1200px; margin: 0 auto; padding: 2rem 1.5rem; }
        h1 { font-size: 1.8rem; margin-bottom: 0.3rem; }
        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .desc { color: #888; }
        .photo-count {
            background: rgba(108, 92, 231, 0.15);
            border: 1px solid rgba(108, 92, 231, 0.3);
            border-radius: 10px;
            padding: 0.4rem 1rem;
            color: #a29bfe;
            font-size: 0.9rem;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 0.8rem;
        }
        .photo-item {
            border-radius: 10px;
            overflow: hidden;
            background: #141414;
            border: 1px solid #2a2a2a;
            aspect-ratio: 4/3;
            cursor: pointer;
            transition: all 0.3s;
        }
        .photo-item:hover {
            border-color: #6c5ce7;
            transform: scale(1.03);
            box-shadow: 0 4px 20px rgba(108,92,231,0.2);
        }
        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 0.4s;
        }
        .photo-item img.loaded { opacity: 1; }

        /* Lightbox */
        .lightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.97);
            z-index: 100;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        .lightbox.active { display: flex; }
        .lightbox img {
            max-width: 92vw;
            max-height: 82vh;
            border-radius: 8px;
            object-fit: contain;
        }
        .lightbox .close {
            position: absolute;
            top: 1rem;
            right: 1.5rem;
            color: #fff;
            font-size: 2.2rem;
            cursor: pointer;
            background: none;
            border: none;
            z-index: 110;
        }
        .lightbox .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(108,92,231,0.3);
            border: none;
            color: #fff;
            font-size: 2rem;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            transition: background 0.3s;
            z-index: 110;
        }
        .lightbox .nav-btn:hover { background: rgba(108,92,231,0.6); }
        .lightbox .prev { left: 1rem; }
        .lightbox .next { right: 1rem; }
        .lightbox .counter {
            color: #888;
            font-size: 0.9rem;
            margin-top: 1rem;
        }
        .lightbox .download-btn {
            display: inline-block;
            margin-top: 0.5rem;
            padding: 0.4rem 1rem;
            background: #6c5ce7;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 0.85rem;
            cursor: pointer;
            text-decoration: none;
        }
        .lightbox .download-btn:hover { opacity: 0.85; }

        footer {
            text-align: center;
            padding: 2rem;
            border-top: 1px solid #1a1a1a;
            color: #555;
            font-size: 0.85rem;
        }
        footer a { color: #6c5ce7; text-decoration: none; }

        @media (max-width: 600px) {
            .gallery { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 0.5rem; }
            .lightbox .nav-btn { width: 40px; height: 40px; font-size: 1.5rem; }
            nav { padding: 0.8rem 1rem; }
        }
    </style>
</head>

        const gallery = document.getElementById('gallery');
        let currentIndex = 0;

        document.getElementById('photoCount').textContent = photos.length + ' fotos';

        // Render gallery items
        photos.forEach((src, i) => {
            const div = document.createElement('div');
            div.className = 'photo-item';
            div.innerHTML = `<img data-src="${src}" alt="Foto ${i + 1}">`;
            div.addEventListener('click', () => openLightbox(i));
            gallery.appendChild(div);
        });

        // Lazy loading with IntersectionObserver
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const img = entry.target;
                    img.src = img.dataset.src;
                    img.onload = () => img.classList.add('loaded');
                    observer.unobserve(img);
                }
            });
        }, { rootMargin: '200px' });

        document.querySelectorAll('.photo-item img').forEach(img => observer.observe(img));

        // Lightbox
        function openLightbox(index) {
            currentIndex = index;
            updateLightbox();
            document.getElementById('lightbox').classList.add('active');
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
        }

        function navigate(dir) {
            currentIndex = (currentIndex + dir + photos.length) % photos.length;
            updateLightbox();
        }

        function updateLightbox() {
            const img = document.getElementById('lightboxImg');
            img.src = photos[currentIndex];
            document.getElementById('counter').textContent = (currentIndex + 1) + ' / ' + photos.length;
            document.getElementById('downloadBtn').href = photos[currentIndex];
        }

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            const lb = document.getElementById('lightbox');
            if (!lb.classList.contains('active')) return;
            if (e.key === 'ArrowLeft') navigate(-1);
            else if (e.key === 'ArrowRight') navigate(1);
            else if (e.key === 'Escape') closeLightbox();
        });

        // Click backdrop to close
        document.getElementById('lightbox').addEventListener('click', (e) => {
            if (e.target === document.getElementById('lightbox')) closeLightbox();
        });
    </script>
</body>
</html>

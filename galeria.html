<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería - Tour Gastronómico Thermomix</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0a0a0a;
            color: #f5f5f5;
            min-height: 100vh;
        }
        nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 2rem;
            background: #111;
            border-bottom: 2px solid #6c5ce7;
            position: sticky;
            top: 0;
            z-index: 50;
        }
        nav a { color: #6c5ce7; text-decoration: none; font-size: 0.9rem; }
        nav .title { color: #fff; font-weight: 600; }

        .container { max-width: 1200px; margin: 0 auto; padding: 2rem 1.5rem; }
        h1 { font-size: 1.8rem; margin-bottom: 0.3rem; }
        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .desc { color: #888; }

        /* Stats bar */
        .stats-bar {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
        }
        .stat-chip {
            background: rgba(108, 92, 231, 0.12);
            border: 1px solid rgba(108, 92, 231, 0.25);
            border-radius: 10px;
            padding: 0.4rem 1rem;
            font-size: 0.85rem;
            color: #a29bfe;
        }
        .stat-chip.green {
            background: rgba(0, 184, 148, 0.12);
            border-color: rgba(0, 184, 148, 0.25);
            color: #55efc4;
        }
        .stat-chip.orange {
            background: rgba(253, 203, 110, 0.12);
            border-color: rgba(253, 203, 110, 0.25);
            color: #fdcb6e;
        }

        /* Filter tabs */
        .filter-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
        .filter-tab {
            padding: 0.4rem 1rem;
            border-radius: 20px;
            border: 1px solid #333;
            background: transparent;
            color: #aaa;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s;
        }
        .filter-tab.active {
            background: #6c5ce7;
            border-color: #6c5ce7;
            color: #fff;
        }

        /* Gallery */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 0.8rem;
        }
        .photo-item {
            border-radius: 10px;
            overflow: hidden;
            background: #141414;
            border: 2px solid #2a2a2a;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }
        .photo-item:hover {
            border-color: #6c5ce7;
            transform: scale(1.02);
        }
        .photo-item.selected {
            border-color: #00b894;
            box-shadow: 0 0 15px rgba(0,184,148,0.3);
        }
        .photo-item .img-wrap {
            aspect-ratio: 4/3;
            overflow: hidden;
        }
        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 0.4s;
        }
        .photo-item img.loaded { opacity: 1; }
        .photo-item .badge {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.85rem;
            z-index: 5;
        }
        .photo-item.selected .badge {
            display: flex;
            background: #00b894;
            color: #000;
        }
        .photo-item .estado-dot {
            position: absolute;
            top: 8px;
            left: 8px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: none;
            z-index: 5;
        }
        .photo-item.selected .estado-dot { display: block; }
        .photo-item .estado-dot.pendiente { background: #fdcb6e; }
        .photo-item .estado-dot.en_proceso { background: #74b9ff; }
        .photo-item .estado-dot.lista { background: #55efc4; }
        .photo-item .edit-preview {
            padding: 0.4rem 0.6rem;
            font-size: 0.75rem;
            color: #888;
            background: #111;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: none;
        }
        .photo-item.selected .edit-preview { display: block; }

        /* Lightbox / Edit Panel */
        .lightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.97);
            z-index: 100;
            overflow-y: auto;
        }
        .lightbox.active { display: flex; }
        .lightbox-inner {
            display: flex;
            width: 100%;
            max-width: 1200px;
            margin: auto;
            padding: 2rem;
            gap: 2rem;
            align-items: flex-start;
        }
        .lightbox .img-side {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }
        .lightbox .img-side img {
            max-width: 100%;
            max-height: 75vh;
            border-radius: 8px;
            object-fit: contain;
        }
        .lightbox .nav-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
            margin-top: 1rem;
        }
        .lightbox .nav-btn {
            background: rgba(108,92,231,0.3);
            border: none;
            color: #fff;
            font-size: 1.5rem;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            transition: background 0.3s;
        }
        .lightbox .nav-btn:hover { background: rgba(108,92,231,0.6); }
        .lightbox .counter { color: #888; font-size: 0.9rem; }
        .lightbox .close {
            position: absolute;
            top: 1rem;
            right: 1.5rem;
            color: #fff;
            font-size: 2.2rem;
            cursor: pointer;
            background: none;
            border: none;
            z-index: 110;
        }

        /* Edit panel */
        .edit-panel {
            width: 320px;
            flex-shrink: 0;
            background: #151515;
            border-radius: 12px;
            padding: 1.5rem;
            border: 1px solid #2a2a2a;
        }
        .edit-panel h3 {
            font-size: 1rem;
            margin-bottom: 1rem;
            color: #fff;
        }
        .edit-panel label {
            display: block;
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 0.3rem;
            margin-top: 1rem;
        }
        .edit-panel label:first-of-type { margin-top: 0; }
        .edit-panel .toggle-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
        }
        .toggle {
            width: 48px;
            height: 26px;
            background: #333;
            border-radius: 13px;
            position: relative;
            cursor: pointer;
            transition: background 0.3s;
        }
        .toggle.on { background: #00b894; }
        .toggle::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            background: #fff;
            border-radius: 50%;
            top: 3px;
            left: 3px;
            transition: transform 0.3s;
        }
        .toggle.on::after { transform: translateX(22px); }
        .edit-panel select,
        .edit-panel textarea {
            width: 100%;
            background: #1a1a1a;
            border: 1px solid #333;
            color: #f5f5f5;
            border-radius: 8px;
            padding: 0.5rem 0.7rem;
            font-size: 0.9rem;
            font-family: inherit;
            resize: vertical;
        }
        .edit-panel textarea { min-height: 80px; }
        .edit-panel select:focus,
        .edit-panel textarea:focus {
            outline: none;
            border-color: #6c5ce7;
        }
        .edit-panel .presets {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            margin-top: 0.5rem;
        }
        .preset-btn {
            padding: 0.3rem 0.6rem;
            border-radius: 6px;
            border: 1px solid #333;
            background: #1a1a1a;
            color: #aaa;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .preset-btn:hover {
            border-color: #6c5ce7;
            color: #fff;
        }
        .edit-panel .save-indicator {
            margin-top: 1rem;
            font-size: 0.8rem;
            color: #555;
            text-align: center;
        }
        .edit-panel .save-indicator.saving { color: #fdcb6e; }
        .edit-panel .save-indicator.saved { color: #55efc4; }

        .realtime-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #e74c3c;
            margin-right: 6px;
            transition: background 0.3s;
        }
        .realtime-dot.connected { background: #55efc4; }

        .download-btn {
            display: inline-block;
            margin-top: 0.8rem;
            padding: 0.4rem 1rem;
            background: #6c5ce7;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 0.85rem;
            cursor: pointer;
            text-decoration: none;
        }
        .download-btn:hover { opacity: 0.85; }

        footer {
            text-align: center;
            padding: 2rem;
            border-top: 1px solid #1a1a1a;
            color: #555;
            font-size: 0.85rem;
        }
        footer a { color: #6c5ce7; text-decoration: none; }

        @media (max-width: 768px) {
            .lightbox-inner { flex-direction: column; padding: 1rem; }
            .edit-panel { width: 100%; }
            .gallery { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 0.5rem; }
            nav { padding: 0.8rem 1rem; }
        }
    </style>
</head>

        const TABLE = 'thermomix_ediciones';
        const HEADERS = { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=representation' };

        // ─── REST API helpers (sin SDK, sin cookies) ───
        async function dbSelect() {
            try {
                const r = await fetch(`${SB_URL}/rest/v1/${TABLE}?select=*&order=created_at.asc`, { headers: HEADERS, credentials: 'omit' });
                if (!r.ok) { console.error('dbSelect:', r.status, await r.text()); return []; }
                return await r.json();
            } catch(e) { console.error('dbSelect error:', e); return []; }
        }
        async function dbInsert(row) {
            try {
                const r = await fetch(`${SB_URL}/rest/v1/${TABLE}`, { method: 'POST', headers: HEADERS, credentials: 'omit', body: JSON.stringify(row) });
                if (!r.ok) { console.error('dbInsert:', r.status, await r.text()); return null; }
                const arr = await r.json(); return arr[0];
            } catch(e) { console.error('dbInsert error:', e); return null; }
        }
        async function dbUpdate(id, updates) {
            try {
                const r = await fetch(`${SB_URL}/rest/v1/${TABLE}?id=eq.${id}`, { method: 'PATCH', headers: HEADERS, credentials: 'omit', body: JSON.stringify(updates) });
                if (!r.ok) { console.error('dbUpdate:', r.status, await r.text()); return false; }
                return true;
            } catch(e) { console.error('dbUpdate error:', e); return false; }
        }
        async function dbDelete(id) {
            try {
                const r = await fetch(`${SB_URL}/rest/v1/${TABLE}?id=eq.${id}`, { method: 'DELETE', headers: HEADERS, credentials: 'omit' });
                if (!r.ok) { console.error('dbDelete:', r.status, await r.text()); return false; }
                return true;
            } catch(e) { console.error('dbDelete error:', e); return false; }
        }

        // ─── Realtime bidireccional via polling (compatible con todos los navegadores) ───
        let pollTimer = null;
        let lastHash = '';

        function setupRealtime() {
            document.getElementById('rtDot').classList.add('connected');
            pollTimer = setInterval(pollChanges, 3000);
        }

        async function pollChanges() {
            const data = await dbSelect();
            const newHash = JSON.stringify(data);
            if (newHash === lastHash) return;
            lastHash = newHash;

            // Detectar eliminaciones
            const newFotos = new Set(data.map(r => r.foto));
            Object.keys(ediciones).forEach(foto => {
                if (!newFotos.has(foto)) {
                    delete ediciones[foto];
                    updatePhotoCard(foto);
                }
            });

            // Aplicar inserts y updates
            data.forEach(row => {
                const prev = ediciones[row.foto];
                if (!prev || prev.updated_at !== row.updated_at || prev.id !== row.id) {
                    ediciones[row.foto] = row;
                    updatePhotoCard(row.foto);

        const ediciones = {};

        const gallery = document.getElementById('gallery');

        // ─── Render gallery ───
        photos.forEach((src, i) => {
            const div = document.createElement('div');
            div.className = 'photo-item';
            div.dataset.index = i;
            div.dataset.foto = src;
            div.innerHTML = `
                <div class="badge">&#10003;</div>
                <div class="estado-dot pendiente"></div>
                <div class="img-wrap"><img data-src="${src}" alt="Foto ${i + 1}"></div>
                <div class="edit-preview"></div>
            `;
            div.addEventListener('click', () => openLightbox(i));
            gallery.appendChild(div);
        });

        // Lazy loading
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const img = entry.target;
                    img.src = img.dataset.src;
                    img.onload = () => img.classList.add('loaded');
                    observer.unobserve(img);
                }
            });
        }, { rootMargin: '300px' });
        document.querySelectorAll('.photo-item img').forEach(img => observer.observe(img));

        // ─── Load from Supabase REST ───
        async function loadEdiciones() {
            const data = await dbSelect();
            data.forEach(row => {
                ediciones[row.foto] = row;
                updatePhotoCard(row.foto);
            });
            updateStats();
        }

        // ─── Update card in gallery ───
        function updatePhotoCard(foto) {
            const el = gallery.querySelector(`[data-foto="${foto}"]`);
            if (!el) return;
            const data = ediciones[foto];
            if (data && data.seleccionada) {
                el.classList.add('selected');
                const dot = el.querySelector('.estado-dot');
                dot.className = 'estado-dot ' + (data.estado || 'pendiente');
                const preview = el.querySelector('.edit-preview');
                preview.textContent = data.edicion || 'Sin instrucciones';
            } else {
                el.classList.remove('selected');
            }
            applyFilter();
        }

        // ─── Stats ───
        function updateStats() {
            const selected = Object.values(ediciones).filter(e => e.seleccionada);
            const pending = selected.filter(e => e.estado === 'pendiente');
            document.getElementById('statTotal').textContent = photos.length + ' fotos';
            document.getElementById('statSelected').textContent = selected.length + ' seleccionadas';
            document.getElementById('statPending').textContent = pending.length + ' pendientes';
        }

        // ─── Filters ───
        document.querySelectorAll('.filter-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentFilter = tab.dataset.filter;
                applyFilter();
            });
        });

        function applyFilter() {
            document.querySelectorAll('.photo-item').forEach(el => {
                const foto = el.dataset.foto;
                const data = ediciones[foto];
                let show = true;
                if (currentFilter === 'seleccionadas') show = data && data.seleccionada;
                else if (currentFilter === 'sin_seleccionar') show = !data || !data.seleccionada;
                else if (currentFilter === 'pendiente') show = data && data.seleccionada && data.estado === 'pendiente';
                else if (currentFilter === 'en_proceso') show = data && data.seleccionada && data.estado === 'en_proceso';
                else if (currentFilter === 'lista') show = data && data.seleccionada && data.estado === 'lista';
                el.style.display = show ? '' : 'none';
            });
        }

        // ─── Lightbox ───
        function openLightbox(index) {
            currentIndex = index;
            updateLightbox();
            document.getElementById('lightbox').classList.add('active');
        }

        function closeLightbox() {
            flushSave();
            document.getElementById('lightbox').classList.remove('active');
        }

        function navigate(dir) {
            flushSave();
            currentIndex = (currentIndex + dir + photos.length) % photos.length;
            updateLightbox();
        }

        function updateLightbox() {
            const foto = photos[currentIndex];
            document.getElementById('lightboxImg').src = foto;
            document.getElementById('counter').textContent = (currentIndex + 1) + ' / ' + photos.length;
            document.getElementById('downloadBtn').href = foto;
            loadPanelFromState();
        }

        function loadPanelFromState() {
            const foto = photos[currentIndex];
            const data = ediciones[foto];
            const toggle = document.getElementById('toggleSelect');
            const estado = document.getElementById('editEstado');
            const edicion = document.getElementById('editEdicion');
            const notas = document.getElementById('editNotas');
            const indicator = document.getElementById('saveIndicator');

            if (data && data.seleccionada) {
                toggle.classList.add('on');
                estado.value = data.estado || 'pendiente';
                edicion.value = data.edicion || '';
                notas.value = data.notas || '';
            } else {
                toggle.classList.remove('on');
                estado.value = 'pendiente';
                edicion.value = '';
                notas.value = '';
            }
            indicator.textContent = 'Sincronizado';
            indicator.className = 'save-indicator saved';
        }

        // ─── Toggle select ───
        async function toggleSelection() {
            const foto = photos[currentIndex];
            const toggle = document.getElementById('toggleSelect');
            const isSelected = toggle.classList.contains('on');

            if (isSelected) {
                toggle.classList.remove('on');
                if (ediciones[foto]) {
                    await dbDelete(ediciones[foto].id);
                    delete ediciones[foto];
                    updatePhotoCard(foto);
                    updateStats();
                }
                showSaveStatus('saved', 'Eliminada');
            } else {
                toggle.classList.add('on');
                const row = { foto, edicion: '', estado: 'pendiente', notas: '', seleccionada: true };
                const inserted = await dbInsert(row);
                if (inserted) {
                    ediciones[foto] = inserted;
                    updatePhotoCard(foto);
                    updateStats();
                }
                showSaveStatus('saved', 'Seleccionada');
            }
        }

        // ─── Auto-save on changes ───
        ['editEstado', 'editEdicion', 'editNotas'].forEach(id => {
            document.getElementById(id).addEventListener('input', () => scheduleSave());
            document.getElementById(id).addEventListener('change', () => scheduleSave());
        });

        function scheduleSave() {
            showSaveStatus('saving', 'Guardando...');
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(() => doSave(), 600);
        }

        function flushSave() {
            if (saveTimeout) {
                clearTimeout(saveTimeout);
                saveTimeout = null;
                doSave();
            }
        }

        async function doSave() {
            const foto = photos[currentIndex];
            const data = ediciones[foto];
            if (!data) return;

            const updates = {
                edicion: document.getElementById('editEdicion').value,
                estado: document.getElementById('editEstado').value,
                notas: document.getElementById('editNotas').value,
                updated_at: new Date().toISOString()
            };

            const ok = await dbUpdate(data.id, updates);
            if (ok) {
                Object.assign(ediciones[foto], updates);
                updatePhotoCard(foto);
                updateStats();
                showSaveStatus('saved', 'Guardado');
            } else {
                showSaveStatus('saving', 'Error al guardar');
            }
        }

        function showSaveStatus(cls, text) {
            const el = document.getElementById('saveIndicator');
            el.className = 'save-indicator ' + cls;
            el.textContent = text;
        }

        // ─── Presets ───
        function addPreset(text) {
            const ta = document.getElementById('editEdicion');
            ta.value = ta.value ? ta.value + ', ' + text : text;
            scheduleSave();
        }

        // ─── Keyboard ───
        document.addEventListener('keydown', (e) => {
            const lb = document.getElementById('lightbox');
            if (!lb.classList.contains('active')) return;
            if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
            if (e.key === 'ArrowLeft') navigate(-1);
            else if (e.key === 'ArrowRight') navigate(1);
            else if (e.key === 'Escape') closeLightbox();
        });

        // Click backdrop
        document.getElementById('lightbox').addEventListener('click', (e) => {
            if (e.target === document.getElementById('lightbox')) closeLightbox();
        });

        // ─── Init ───
        loadEdiciones();
        setupRealtime();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería - Tour Gastronómico Thermomix</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0a0a0a;
            color: #f5f5f5;
            min-height: 100vh;
        }
        nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 2rem;
            background: #111;
            border-bottom: 2px solid #6c5ce7;
        }
        nav a { color: #6c5ce7; text-decoration: none; font-size: 0.9rem; }
        nav .title { color: #fff; font-weight: 600; }

        .container { max-width: 1000px; margin: 0 auto; padding: 2rem 1.5rem; }
        h1 { font-size: 1.8rem; margin-bottom: 0.3rem; }
        .desc { color: #888; margin-bottom: 2rem; }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 1rem;
        }
        .photo-item {
            border-radius: 12px;
            overflow: hidden;
            background: #141414;
            border: 1px solid #2a2a2a;
            aspect-ratio: 4/3;
            cursor: pointer;
            transition: all 0.3s;
        }
        .photo-item:hover {
            border-color: #6c5ce7;
            transform: scale(1.02);
        }
        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 5rem 2rem;
            color: #555;
        }
        .empty-state .icon { font-size: 4rem; margin-bottom: 1rem; }
        .empty-state p { margin-bottom: 0.5rem; }
        .empty-state .date-note {
            display: inline-block;
            margin-top: 1rem;
            background: rgba(108, 92, 231, 0.15);
            border: 1px solid rgba(108, 92, 231, 0.3);
            border-radius: 10px;
            padding: 0.6rem 1.2rem;
            color: #a29bfe;
            font-size: 0.9rem;
        }

        /* Lightbox */
        .lightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 100;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .lightbox.active { display: flex; }
        .lightbox img {
            max-width: 90vw;
            max-height: 90vh;
            border-radius: 8px;
        }
        .lightbox .close {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            color: #fff;
            font-size: 2rem;
            cursor: pointer;
            background: none;
            border: none;
        }

        footer {
            text-align: center;
            padding: 2rem;
            border-top: 1px solid #1a1a1a;
            color: #555;
            font-size: 0.85rem;
        }
        footer a { color: #6c5ce7; text-decoration: none; }
    </style>
</head>
<body>

    <nav>
        <a href="asistentes.html">&larr; Volver</a>
        <span class="title">Galería de Fotos</span>
        <span></span>
    </nav>

    <div class="container">
        <h1>&#128247; Galería del Evento</h1>
        <p class="desc">Fotos del Tour Gastronómico Thermomix - León 2026</p>

        <div class="gallery" id="gallery">
            <div class="empty-state">
                <div class="icon">&#128247;</div>
                <p>Las fotos estarán disponibles después del evento</p>
                <p style="font-size: 0.85rem;">Podrás ver y descargar las mejores tomas aquí</p>
                <div class="date-note">&#128197; Disponible a partir del 21 de Abril, 2026</div>
            </div>
        </div>
    </div>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox" onclick="this.classList.remove('active')">
        <button class="close">&times;</button>
        <img id="lightboxImg" src="" alt="">
    </div>

    <footer>
        <p>Thermomix México | Cobertura por <a href="https://foro7.invitados.org">Foro 7 Producciones</a></p>
    </footer>

    <script>
        // Lightbox para cuando haya fotos
        document.getElementById('gallery').addEventListener('click', (e) => {
            const item = e.target.closest('.photo-item');
            if (!item) return;
            const img = item.querySelector('img');
            if (!img) return;
            document.getElementById('lightboxImg').src = img.src;
            document.getElementById('lightbox').classList.add('active');
        });
    </script>
</body>
</html>
